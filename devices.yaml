# devices.yaml - Configuration file for Android Bootloader & Recovery Tool

# --- Default Configuration ---
# This section provides fallback commands and settings
# that are used if no specific device match is found.
default:
  # Commands (Use the exact command string for adb or fastboot)
  unlock_command: "fastboot flashing unlock" # Common command for newer devices
  lock_command: "fastboot flashing lock"   # Common command for newer devices

  # ADB/Fastboot Reboot Commands
  adb_reboot_bootloader_command: "adb reboot bootloader"
  adb_reboot_recovery_command: "adb reboot recovery"
  adb_reboot_system_command: "adb reboot"
  fastboot_reboot_command: "fastboot reboot"

  # Partition names
  recovery_partition: "recovery"
  boot_partition: "boot"

  # Warning messages
  unlock_warning: "Unlocking the bootloader will wipe all user data (factory reset) and may void your warranty! Proceed with caution."
  lock_warning: "Locking the bootloader will wipe all user data. Ensure you have backups before proceeding."

  notes: "General default configuration. May not work for all devices."


# --- Device-Specific Configurations for Xiaomi Mi Series (since Mi 5) ---
# These entries use common commands found for these model lines,
# but PARTITION NAMES can vary significantly, especially on A/B devices.
# ALWAYS RESEARCH your specific model if these commands/partitions fail.
# You MUST also go through Xiaomi's official 'Mi Unlock' process if required
# before fastboot unlock commands will work on many devices.

# Generic Xiaomi entry (fallback for Mi/Redmi/Poco if model not listed)
"xiaomi":
  unlock_command: "fastboot flashing unlock" # Most common modern unlock cmd for Xiaomi
  lock_command: "fastboot flashing lock"   # Most common modern lock cmd for Xiaomi
  # Partition names might be more specific per model
  recovery_partition: "recovery"
  boot_partition: "boot"
  notes: "Generic Xiaomi config. Use this if your specific Mi model is not listed."

# Mi 5 / Mi 5s / Mi 5s Plus
"xiaomi mi 5":
  unlock_command: "fastboot oem unlock" # Mi 5 series often used 'oem' unlock
  lock_command: "fastboot oem lock"   # Mi 5 series often used 'oem' lock
  # Inherits partitions/reboot/warnings from default or generic xiaomi
  notes: "Config for Mi 5 series (using oem unlock)."

# Mi 6
"xiaomi mi 6":
  unlock_command: "fastboot flashing unlock" # Likely 'flashing' unlock
  lock_command: "fastboot flashing lock"
  # Inherits other settings
  notes: "Config for Mi 6."

# Mi 8 / Mi 8 SE / Mi 8 Pro / Mi 8 Explorer
"xiaomi mi 8": # Matches all Mi 8 variants
  unlock_command: "fastboot flashing unlock"
  lock_command: "fastboot flashing lock"
  # Partition names like 'boot_a', 'boot_b', 'recovery_a', 'recovery_b' might be needed
  # depending on A/B slot usage and command. 'boot' and 'recovery' often work by targeting current slot.
  recovery_partition: "recovery"
  boot_partition: "boot"
  notes: "Config for Mi 8 series (A/B slot possible, check partition names if flashing fails)."

# Mi 9 / Mi 9 SE / Mi 9 Pro / Mi 9 Lite
"xiaomi mi 9": # Matches all Mi 9 variants
  unlock_command: "fastboot flashing unlock"
  lock_command: "fastboot flashing lock"
  # Partition names similar to Mi 8
  recovery_partition: "recovery"
  boot_partition: "boot"
  notes: "Config for Mi 9 series (A/B slot possible)."

